<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oussama Boutira Portfolio — front-end & full-stack student at JobInTeck."
    />
    <meta name="theme-color" content="#071029" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Oussama Boutira — Portfolio" />
    <meta
      property="og:description"
      content="Oussama Boutira — student at JobInTeck. Projects, skills and contact."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourdomain.example/" />
    <title>Oussama Boutira — Portfolio</title>

    <!-- Preconnect to font origins (keep these — they're cheap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts — NON-BLOCKING load via media swap trick -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Devicon — NON-BLOCKING load -->
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
